<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  {% include head.html %}
  <body class="layout-{{ page.layout | default: 'default' }}">
    <a class="skip-link" href="#content">Skip to content</a>
    <header class="site-header">
      <div class="site-shell header-inner">
        <a class="site-identity" href="{{ '/' | relative_url }}" aria-label="{{ site.title }}: home">
          <span class="identity-mark" aria-hidden="true">SV</span>
          <span>
            <strong>{{ site.title }}</strong>
            <small>{{ site.tagline }}</small>
          </span>
        </a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">Menu</button>
        <nav id="site-nav" class="site-nav" aria-label="Primary navigation">
          <a href="{{ '/writing/' | relative_url }}"{% if page.url == '/writing/' %} aria-current="page"{% endif %}>Writing</a>
          <a href="{{ '/research/' | relative_url }}"{% if page.url == '/research/' %} aria-current="page"{% endif %}>Research</a>
          <a href="{{ '/explore/' | relative_url }}"{% if page.url == '/explore/' %} aria-current="page"{% endif %}>Explore</a>
          <a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} aria-current="page"{% endif %}>About</a>
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to dark theme" aria-pressed="false">
            <span class="theme-toggle-icon" aria-hidden="true">◐</span>
            <span data-theme-label>Dark</span>
          </button>
          <button class="search-trigger" type="button" data-search-open aria-label="Open search">Search <kbd>/</kbd></button>
        </nav>
      </div>
    </header>

    <main id="content" class="site-main">
      {{ content }}
    </main>

    {% include footer.html %}
    {% include search-dialog.html %}
    {% if site.google_analytics and site.google_analytics != "" %}
      {% include analytics-consent.html %}
    {% endif %}
  </body>
</html>
