<dialog class="search-dialog" data-search-dialog aria-labelledby="search-title">
  <div class="search-dialog-inner">
    <div class="search-dialog-head">
      <div>
        <p class="eyebrow">Search the notebook</p>
        <h2 id="search-title">Find an idea, person, or connection</h2>
      </div>
      <button type="button" class="dialog-close" data-search-close aria-label="Close search">×</button>
    </div>
    <label class="search-field">
      <span class="sr-only">Search writing</span>
      <input type="search" data-global-search placeholder="Try “morphogenesis”, “Turing”, or “entropy”" autocomplete="off">
    </label>
    <div class="search-results" data-global-results aria-live="polite">
      <p class="search-hint">Start typing to search titles, summaries, tags, people, and concepts.</p>
    </div>
  </div>
</dialog>
