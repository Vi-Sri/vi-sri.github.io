<aside class="analytics-consent" data-analytics-consent data-measurement-id="{{ site.google_analytics }}" hidden aria-labelledby="analytics-consent-title">
  <div>
    <strong id="analytics-consent-title">Help improve this notebook?</strong>
    <p>Anonymous usage analytics can show which essays and connections are useful. Analytics stays off unless you accept.</p>
  </div>
  <div class="analytics-actions">
    <button type="button" class="button button-primary" data-analytics-accept>Accept analytics</button>
    <button type="button" class="button button-secondary" data-analytics-reject>No thanks</button>
  </div>
</aside>
<script src="{{ '/assets/js/analytics-consent.js' | relative_url }}" defer></script>
