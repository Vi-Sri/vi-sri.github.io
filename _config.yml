title: "Srinivas Venkatanarayanan"
tagline: "Computation, emergence, and the architectures of life"
description: "Research essays and field notes connecting computation, evolution, morphogenesis, artificial intelligence, complex adaptive systems, and mathematical physics."
url: "https://tummo.ai"
baseurl: ""
repository: "Vi-Sri/vi-sri.github.io"
lang: en-US
timezone: America/New_York

# Add the values from Google only after the corresponding properties exist.
# These identifiers are public configuration, not secrets.
google_site_verification: ""
google_analytics: "G-6VQSSQG4PY"

wikilinks:
  strict: true

author:
  name: "Srinivas Venkatanarayanan"
  url: "https://tummo.ai/about/"
  email: "srinivasvishal7@gmail.com"

logo: /assets/images/profile.png
social:
  name: "Srinivas Venkatanarayanan"
  links:
    - "https://github.com/Vi-Sri"
    - "https://www.linkedin.com/in/vishal-srinivas-9234703a/"
    - "https://twitter.com/PsNotNP"

github:
  is_project_page: false
  repository_url: "https://github.com/Vi-Sri/vi-sri.github.io"

permalink: /writing/:title/
future: false
show_excerpts: true
markdown: kramdown
strict_front_matter: true
disable_disk_cache: true
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

feed:
  path: feed.xml

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: "Srinivas Venkatanarayanan"
      content_type: essay
      status: todo
  - scope:
      path: ""
    values:
      image: /assets/images/og.png
  - scope:
      path: "tag"
    values:
      noindex: true
      sitemap: false
  - scope:
      path: "category"
    values:
      noindex: true
      sitemap: false

exclude:
  - AGENTS.md
  - docs
  - Gemfile
  - Gemfile.lock
  - Dockerfile
  - compose.yaml
  - README.md
  - assets/pdf/Vishal_Srinivas_VisualCV_Resume.pdf
  - vendor
